# Path-routes to loopback services: /indexer/ -> 8080, /relayer/ -> 8081; certbot manages TLS.

server {
  listen 80;
  server_name private.cyphras.com;

  # certbot --nginx fills in the TLS listener and certificate paths below.
  # listen 443 ssl;
  # ssl_certificate     /etc/letsencrypt/live/private.cyphras.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/private.cyphras.com/privkey.pem;
  # include /etc/letsencrypt/options-ssl-nginx.conf;
  # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # SSE: unbuffered, long-lived; must precede the /indexer/ prefix to win the match.
  location = /indexer/stream {
    proxy_pass http://127.0.0.1:8080/stream;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 1h;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Trailing slash on proxy_pass strips the prefix before forwarding.
  location /indexer/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Trailing slash on proxy_pass strips the prefix before forwarding.
  location /relayer/ {
    proxy_pass http://127.0.0.1:8081/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
